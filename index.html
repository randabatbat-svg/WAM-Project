<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WAM | Search Pro</title>
    <style>
        body { background-color: #000; color: white; margin: 0; font-family: sans-serif; text-align: center; }
        .search-container { padding: 50px; background: rgba(20, 20, 20, 0.9); border-bottom: 2px solid #e00000; }
        input { padding: 15px; width: 60%; border-radius: 30px; border: none; font-size: 1.2rem; }
        button { padding: 15px 30px; border-radius: 30px; border: none; background: #e00000; color: white; cursor: pointer; font-weight: bold; }
        
        #results { display: flex; flex-wrap: wrap; justify-content: center; padding: 20px; }
        .card { background: #1a1a1a; margin: 10px; padding: 20px; border-radius: 10px; width: 250px; border: 1px solid #333; }
        .card img { width: 100%; border-radius: 5px; }
        .card h3 { color: #e00000; }
    </style>
</head>
<body>

    <div class="search-container">
        <h1>ابحث عن نجمك المفضل</h1>
        <input type="text" id="searchInput" placeholder="اكتب اسم المصارع أو المقاتل بالإنجليزية...">
        <button onclick="searchFighter()">بحث</button>
    </div>

    <div id="results">
        </div>

    <script>
        async function searchFighter() {
            const query = document.getElementById('searchInput').value;
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = "جاري البحث في الـ API...";

            try {
                // ملاحظة: سنستخدم API تجريبي لجلب البيانات
                const response = await fetch(`https://www.thesportsdb.com/api/v1/json/3/searchplayers.php?p=${query}`);
                const data = await response.json();

                resultsDiv.innerHTML = ""; // مسح رسالة التحميل

                if (data.player) {
                    data.player.forEach(player => {
                        if (player.strSport === "Fighting" || player.strSport === "MMA" || player.strTeam === "WWE") {
                            resultsDiv.innerHTML += `
                                <div class="card">
                                    <img src="${player.strThumb || 'https://via.placeholder.com/150'}" alt="${player.strPlayer}">
                                    <h3>${player.strPlayer}</h3>
                                    <p>الرياضة: ${player.strSport}</p>
                                    <p>الجنسية: ${player.strNationality}</p>
                                </div>
                            `;
                        }
                    });
                } else {
                    resultsDiv.innerHTML = "لم يتم العثور على نتائج. جرب اسم آخر مثل 'John Cena' أو 'Khabib'.";
                }
            } catch (error) {
                resultsDiv.innerHTML = "حدث خطأ في الاتصال بالـ API.";
            }
        }
    </script>

</body>
</html>
