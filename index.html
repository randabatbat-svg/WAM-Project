<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WAM | WWE & NXT Universe</title>
    <style>
        :root { --main-red: #e00000; --dark-bg: #050505; --card-bg: #121212; }
        body { background-color: var(--dark-bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; }
        
        /* القسم الأول: الغلاف (الصور اللي رفعتها) */
        .hero-section { 
            height: 100vh; 
            background: linear-gradient(rgba(0,0,0,0.4), #000), url('wwe-bg.jpg') no-repeat center top/cover;
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
        }
        .hero-section h1 { font-size: 5rem; color: var(--main-red); text-shadow: 0 0 20px #ff0000; margin: 0; }
        .hero-section p { font-size: 1.5rem; background: var(--main-red); padding: 5px 20px; border-radius: 50px; }

        /* فاصل الصاعقة */
        .lightning {
            height: 150px;
            background: url('lightning.gif') center/cover;
            border-top: 3px solid #00f3ff; border-bottom: 3px solid #00f3ff;
        }

        /* قسم قاعدة البيانات */
        .db-section { padding: 40px 5%; }
        .category-title { margin: 40px 0 20px; color: #fff; font-size: 1.8rem; border-right: 5px solid var(--main-red); padding-right: 15px; text-align: right; }
        
        .names-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
        .name-card { 
            background: var(--card-bg); color: #ddd; border: 1px solid #222; padding: 12px; 
            border-radius: 10px; cursor: pointer; transition: 0.3s; font-weight: bold; text-align: center;
        }
        .name-card:hover { background: var(--main-red); color: white; transform: translateY(-5px); }

        /* نافذة التفاصيل */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(5px); }
        .modal-content { 
            background: #1a1a1a; margin: 10% auto; padding: 30px; border: 2px solid var(--main-red); 
            width: 85%; max-width: 450px; border-radius: 20px; position: relative; text-align: center;
        }
        .close-btn { position: absolute; left: 20px; top: 15px; color: #fff; font-size: 35px; cursor: pointer; }
        .info-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #252525; }
        .info-label { color: var(--main-red); font-weight: bold; }
    </style>
</head>
<body>

    <div class="hero-section">
        <h1>WAM</h1>
        <p>WWE & THE BLOODLINE EDITION</p>
    </div>

    <div class="lightning"></div>

    <div class="db-section">
        <div class="category-title">🔥 نجوم NXT</div>
        <div id="nxt-men-grid" class="names-grid"></div>

        <div class="category-title">👩 سيدات NXT</div>
        <div id="nxt-women-grid" class="names-grid"></div>

        <div class="
