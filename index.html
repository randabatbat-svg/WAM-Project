<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WAM | قاعدة بيانات الأساطير</title>
    <style>
        :root { --main-red: #e00000; --dark-bg: #0a0a0a; --card-bg: #161616; }
        body { background-color: var(--dark-bg); color: white; font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; text-align: center; }
        
        header { padding: 40px; background: linear-gradient(to bottom, #1a1a1a, #000); border-bottom: 3px solid var(--main-red); }
        h1 { color: var(--main-red); font-size: 3rem; text-shadow: 0 0 15px #ff0000; margin: 0; }
        
        .section-title { margin: 40px 0 20px; color: #fff; font-size: 2rem; border-right: 5px solid var(--main-red); padding-right: 15px; display: inline-block; }
        
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; padding: 0 10%; margin-bottom: 50px; }
        
        .name-btn { 
            background: var(--card-bg); color: white; border: 1px solid #333; padding: 15px; 
            border-radius: 8px; cursor: pointer; transition: 0.3s; font-size: 1rem; font-weight: bold;
        }
        .name-btn:hover { background: var(--main-red); border-color: white; transform: scale(1.05); box-shadow: 0 0 15px var(--main-red); }

        /* نافذة التفاصيل (Modal) */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); }
        .modal-content { 
            background: var(--card-bg); margin: 10% auto; padding: 30px; border: 2px solid var(--main-red); 
            width: 80%; max-width: 500px; border-radius: 15px; position: relative;
        }
        .close { position: absolute; left: 20px; top: 10px; color: #fff; font-size: 30px; cursor: pointer; }
        .modal h2 { color: var(--main-red); margin-top: 0; }
        .details-list { text-align: right; list-style: none; padding: 0; font-size: 1.2rem; }
        .details-list li { margin: 10px 0; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .details-list b { color: var(--main-red); }
    </style>
</head>
<body>

<header>
    <h1>WAM DB</h1>
    <p>قاعدة بيانات المصارعين الرسمية - جاك</p>
</header>

<div class="section-title">🔥 نجوم NXT</div>
<div id="nxt-men" class="grid-container"></div>

<div class="section-title">👩 سيدات NXT</div>
<div id="nxt-women" class="grid-container"></div>

<div class="section-title">🏆 أساطير WWE</div>
<div id="wwe-legends" class="grid-container"></div>

<div id="myModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <h2 id="m-name">اسم المصارع</h2>
        <ul class="details-list">
            <li><b>العمر:</b> <span id="m-age"></span></li>
            <li><b>الطول:</b> <span id="m-height"></span></li>
            <li><b>الوزن:</b> <span id="m-weight"></span></li>
            <li><b>البطولات:</b> <span id="m-titles"></span></li>
            <li><b>عدد المباريات:</b> <span id="m-matches"></span></li>
        </ul>
    </div>
</div>

<script>
    // بيانات المصارعين (قاعدة بيانات مصغرة)
    const playersData = {
        "Roman Reigns": {age: 38, h: "191 cm", w: "120 kg", t: "Undisputed Champion", m: "1,300+"},
        "The Rock": {age: 51, h: "196 cm", w: "118 kg", t: "10x WWE Champion", m: "850+"},
        "John Cena": {age: 46, h: "185 cm", w: "114 kg", t: "16x World Champion", m: "2,200+"},
        "Carmelo Hayes": {age: 29, h: "178 cm", w: "95 kg", t: "NXT Champion", m: "300+"},
        "Bron Breakker": {age: 26, h: "183 cm", w: "104 kg", t: "2x NXT Champion", m: "150+"},
        "The Undertaker": {age: 58, h: "208 cm", w: "136 kg", t: "7x Champion / 25-2 WrestleMania", m: "2,300+"}
        // يمكن إضافة بقية الـ 50 اسم هنا بنفس الطريقة
    };

    const nxtMen = ["Carmelo Hayes", "Bron Breakker", "Ilja Dragunov", "Trick Williams", "Dijak", "Wes Lee", "Joe Gacy", "Grayson Waller", "Tony D’Angelo", "Nathan Frazer", "Noam Dar", "Dragon Lee", "Baron Corbin", "Apollo Crews", "Von Wagner", "Lexis King", "Oba Femi", "Eddy Thorpe"];
    const nxtWomen = ["Roxanne Perez", "Tiffany Stratton", "Lyra Valkyria", "Cora Jade", "Gigi Dolin", "Jacy Jayne", "Fallon Henley", "Thea Hail", "Blair Davenport", "Kiana James"];
    const legends = ["The Rock", "Stone Cold Steve Austin", "The Undertaker", "John Cena", "Triple H", "Shawn Michaels", "Kane", "Hulk Hogan", "Randy Savage", "Bret Hart", "Ric Flair", "Goldberg", "Brock Lesnar", "Edge", "Batista", "The Big Show", "Mick Foley", "Kurt Angle", "Chris Jericho", "Rey Mysterio", "Eddie Guerrero", "Booker T", "Rob Van Dam", "Jeff Hardy", "Matt Hardy", "Ultimate Warrior", "Yokozuna", "Diesel (Kevin Nash)", "Scott Hall", "The Iron Sheik"];

    function createButtons(list, containerId) {
        const container = document.getElementById(containerId);
        list.forEach(name => {
            const btn = document.createElement("button");
            btn.className = "name-btn";
            btn.innerText = name;
            btn.onclick = () => showDetails(name);
            container.appendChild(btn);
        });
    }

    function showDetails(name) {
        const data = playersData[name] || {age: "قريباً", h: "قريباً", w: "قريباً", t: "قريباً", m: "قريباً"};
        document.getElementById("m-name").innerText = name;
        document.getElementById("m-age").innerText = data.age;
        document.getElementById("m-height").innerText = data.h;
        document.getElementById("m-weight").innerText = data.w;
        document.getElementById("m-titles").innerText = data.t;
        document.getElementById("m-matches").innerText = data.m;
        document.getElementById("myModal").style.display = "block";
    }

    function closeModal() { document.getElementById("myModal").style.display = "none"; }

    // تشغيل الدوال
    createButtons(nxtMen, "nxt-men");
    createButtons(nxtWomen, "nxt-women");
    createButtons(legends, "wwe-legends");
</script>

</body>
</html>
