<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WAM | WWE & MMA</title>
    <style>
        body { background-color: #000; color: white; margin: 0; font-family: 'Arial Black', sans-serif; }
        
        /* قسم رومان وسولو */
        .wwe-cover { 
            height: 100vh; 
            background: linear-gradient(rgba(0,0,0,0.3), #000), url('wwe-bg.jpg') no-repeat center top/cover;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        h1 { font-size: 5rem; color: #e00000; text-shadow: 0 0 20px #ff0000; margin: 0; }

        /* فاصل الصاعقة */
        .lightning {
            height: 150px;
            background: url('lightning.gif') center/cover;
            border-top: 3px solid #00f3ff; border-bottom: 3px solid #00f3ff;
        }

        /* قسم MMA */
        .mma-cover {
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.4), #000), url('mma-bg.jpg') no-repeat center/cover;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
    </style>
</head>
<body>
    <div class="wwe-cover">
        <h1>WAM WWE</h1>
    </div>

    <div class="lightning"></div>

    <div class="mma-cover">
        <h1 style="color: #00f3ff; text-shadow: 0 0 20px #00f3ff;">WAM MMA</h1>
    </div>
</body>
</html>
